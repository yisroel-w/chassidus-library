<!DOCTYPE html>
<html lang="en" data-dark="0" data-fs="md">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#262320">
<title>Chassidus Library</title>
<meta name="description" content="Bilingual English / Hebrew translations of the works of the Lubavitcher Rebbe — Hayom Yom, Igros Kodesh, Likkutei Sichos, Maamarim Melukatim, Toras Menachem, and more.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./assets/design.css">
</head>
<body>

<div class="ab">
  <div class="ab-title ab-title-he">ספרי הרבי</div>
  <button class="ab-btn" id="btn-set" aria-label="Settings">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
</div>

<div class="hero">
  <div class="hero-orn">✦ &nbsp; ✦ &nbsp; ✦</div>
  <div class="hero-he">תורת מנחם</div>
  <div class="hero-en">Chassidus Library</div>
  <div class="hero-rule"></div>
  <div class="hero-sub">Bilingual translations from the works of the Lubavitcher Rebbe</div>
</div>

<div class="lsearch">
  <input id="lsearch" type="search" placeholder="Search books and series…" autocomplete="off">
</div>

<button class="rand-btn" id="rand-btn">
  <svg viewBox="0 0 24 24"><path d="M16 3h5v5"/><path d="M4 20L21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/></svg>
  Open at random
</button>

<div id="shelf" class="shelf"></div>

<div id="library">
  <div class="loading"><div class="spinner"></div></div>
</div>

<!-- Settings sheet -->
<div id="ssheet">
  <div class="sbdrop"></div>
  <div class="spanel">
    <div class="shandle"></div>
    <div class="stitle">Settings</div>
    <div class="srow">
      <div class="slbl">Dark mode<small>Comfortable in low light</small></div>
      <button class="tswitch" id="dark-tog" aria-label="Dark mode"></button>
    </div>
    <div class="srow">
      <div class="slbl">Default text size</div>
      <div class="fsctrl">
        <button class="fsbtn" data-fs="sm">A</button>
        <button class="fsbtn on" data-fs="md">A</button>
        <button class="fsbtn" data-fs="lg">A</button>
      </div>
    </div>
  </div>
</div>

<script src="./assets/home.js"></script>
</body>
</html>
